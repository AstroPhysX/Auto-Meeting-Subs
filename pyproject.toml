[tool.briefcase]
project_name = "AMS"
formal_name = "Auto-Meeting-Subs"
bundle = "com.github.astrophysx.ams"
version = "1.0"
description = "Automatic Meeting Subtitles and Summary"
long_description = "Auto Meeting Subs is a command-line application that transcribes meeting recordings using WhisperX,then generates structured summaries using Ollama."
author = "AstroPhysX"
url = "https://github.com/AstroPhysX/Auto-Meeting-Subs"
license.file = "LICENSE.txt"

[tool.briefcase.app.ams]
sources = ["src/ams"]
icon = "icons/Auto-Meeting-Subs"
requires = [
    "filetype",
    "whisperx",
    "psutil",
    "requests",
    "ollama",
    "better-ffmpeg-progress",
    "tqdm"
]