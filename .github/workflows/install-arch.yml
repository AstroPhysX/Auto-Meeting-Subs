name: Arch Linux install

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-install-arch:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install unzip (host)
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Verify Docker
        run: docker --version

      - name: Run Arch Linux container and test install
        run: |
          docker run --rm -v $PWD:/workspace -w /workspace archlinux:latest /bin/bash -c "
            set -e

            echo 'Updating package database...'
            pacman -Sy --noconfirm unzip git base-devel

            echo 'Extracting release zip...'
            unzip release_zips/Auto-Meeting-Subs-linux.zip -d extracted
            INSTALL_PATH=\$(find extracted -name install.sh | head -n 1)
            echo 'Found installer at: ' \$INSTALL_PATH

            chmod +x \"\$INSTALL_PATH\"
            echo 'Running installer...'
            bash \"\$INSTALL_PATH\"

            echo 'Verifying binary...'
            test -f \"\$HOME/.local/bin/auto-meeting-subs\"

            echo 'Verifying virtual environment...'
            test -d \"\$HOME/.local/share/auto-meeting-subs/venv\"

            echo 'Running smoke test...'
            timeout 5 \"\$HOME/.local/bin/auto-meeting-subs\" || true

            echo 'Listing installed files (debug)...'
            ls -R \"$HOME/.local/share/auto-meeting-subs\" || true
          "