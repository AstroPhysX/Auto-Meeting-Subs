name: Mac install test
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-install-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install unzip
        run: brew install unzip || true

      - name: Extract release zip
        run: |
          unzip release_zips/Auto-Meeting-Subs-mac.zip -d extracted
          ls -R extracted

      - name: Locate install.command
        id: locate
        run: |
          INSTALL_PATH=$(find extracted -name install.command | head -n 1)
          echo "INSTALL_PATH=$INSTALL_PATH" >> $GITHUB_ENV
          echo "Found installer at $INSTALL_PATH"

      - name: Make installer executable
        run: chmod +x "$INSTALL_PATH"

      - name: Run install script
        run: bash "$INSTALL_PATH"

      - name: Verify isolated Python exists
        run: test -x "$HOME/.local/share/Auto-Meeting-Subs/python/bin/python3.10"

      - name: Verify launcher created
        run: test -f "$HOME/Applications/Auto-Meeting-Subs.app/Contents/MacOS/launch.command"

      - name: Smoke test launch
        shell: bash
        run: |
          LAUNCHER="$HOME/Applications/Auto-Meeting-Subs.app/Contents/MacOS/launch.command"
          echo "Running launcher: $LAUNCHER"

          # Run the launcher non-interactively with a timeout
          timeout 5 "$LAUNCHER" || true

          echo "Smoke test completed"

      - name: Test Python first run
        shell: bash
        run: |
          PYTHON="$HOME/.local/share/Auto-Meeting-Subs/python/bin/python3.10"
          MAIN="$HOME/.local/share/Auto-Meeting-Subs/main.py"

          echo "Running main.py using isolated Python..."
          set -o errexit
          "$PYTHON" "$MAIN" || true

          echo "Smoke test completed"
          
      - name: Show installed files (debug)
        if: failure()
        run: ls -R "$HOME/.local/share/Auto-Meeting-Subs" || true