on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-install:
    strategy:
      matrix:
        distro: [ubuntu-22.04, fedora-38, archlinux, opensuse-leap-15.5]

    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install prerequisites on host
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip docker.io

      - name: Extract release zip (host)
        if: matrix.distro == 'ubuntu-22.04'
        run: |
          unzip release_zips/Auto-Meeting-Subs-linux-v1.0.zip -d extracted
          ls -R extracted

      - name: Run tests on host Ubuntu
        if: matrix.distro == 'ubuntu-22.04'
        run: |
          INSTALL_PATH=$(find extracted -name install.sh | head -n 1)
          chmod +x "$INSTALL_PATH"
          bash "$INSTALL_PATH"
          test -f "$HOME/.local/bin/auto-meeting-subs"
          test -d "$HOME/.local/share/auto-meeting-subs/venv"
          timeout 5 "$HOME/.local/bin/auto-meeting-subs" || true

      - name: Run tests in Docker (non-Ubuntu)
        if: matrix.distro != 'ubuntu-22.04'
        run: |
          DISTRO=${{ matrix.distro }}
          echo "Testing inside Docker: $DISTRO"

          # Choose Docker image
          case "$DISTRO" in
            fedora-38) IMAGE="fedora:38" ;;
            archlinux) IMAGE="archlinux:latest" ;;
            opensuse-leap-15.5) IMAGE="opensuse/leap:15.5" ;;
            *) echo "Unknown distro $DISTRO"; exit 1 ;;
          esac

          # Prepare container
          docker run --rm -v $PWD:/workspace -w /workspace "$IMAGE" /bin/bash -c "
            set -e
            echo 'Installing unzip...'
            if command -v dnf &>/dev/null; then
              dnf install -y unzip
            elif command -v pacman &>/dev/null; then
              pacman -Sy --noconfirm unzip
            elif command -v zypper &>/dev/null; then
              zypper install -y unzip
            elif command -v apt &>/dev/null; then
              apt-get update && apt-get install -y unzip
            fi

            echo 'Extracting zip...'
            unzip release_zips/Auto-Meeting-Subs-linux-v1.0.zip -d extracted
            INSTALL_PATH=\$(find extracted -name install.sh | head -n 1)
            chmod +x \"\$INSTALL_PATH\"

            echo 'Running installer...'
            bash \"\$INSTALL_PATH\"

            echo 'Verifying binary...'
            test -f \"\$HOME/.local/bin/auto-meeting-subs\"
            test -d \"\$HOME/.local/share/auto-meeting-subs/venv\"

            echo 'Running smoke test...'
            timeout 5 \"\$HOME/.local/bin/auto-meeting-subs\" || true
          "